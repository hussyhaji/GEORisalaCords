<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Risala Coordinates Map</title>

<!-- ============================================================
     LIBRARIES
     OpenLayers v8 (map engine) + PapaParse (CSV parser), both CDN.
     ============================================================ -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@8.2.0/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@8.2.0/dist/ol.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<!-- Font: Amiri for all UI and map labels -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN TOKENS
   A soft pastel "card UI" palette: lavender / mint / blush,
   sitting on top of a dark satellite basemap for contrast.
   ============================================================ */
:root{
  --lavender:      #E7E2FB;
  --lavender-deep: #8B7FD1;
  --mint:          #D8F5E9;
  --mint-deep:     #4FAE8C;
  --blush:         #FDE2E7;
  --blush-deep:    #E2789A;
  --cream:         #FBF9F6;
  --ink:           #2E2A3D;
  --ink-soft:      #6B657F;
  --panel-bg:      rgba(251, 249, 246, 0.94);
  --radius-lg:     22px;
  --radius-md:     14px;
  --radius-sm:     10px;
  --shadow-soft:   0 12px 32px rgba(46, 42, 61, 0.18);
  --font-display:  'Amiri', serif;
  --font-body:     'Amiri', serif;
}

*{ box-sizing: border-box; }

html, body{
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  font-family: var(--font-body);
  color: var(--ink);
  overflow: hidden;
}

#map{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: #0d1117;
}

/* Cursor states driven by JS: default vs pointer-over-feature */
#map.feature-hover{ cursor: pointer; }

/* ============================================================
   LOADING OVERLAY (shown while CSV is fetched / parsed)
   ============================================================ */
#loading-overlay{
  position: absolute;
  inset: 0;
  background: var(--ink);
  color: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  font-family: var(--font-display);
  z-index: 50;
  transition: opacity 0.4s ease;
}
#loading-overlay.hidden{ opacity: 0; pointer-events: none; }
.spinner{
  width: 34px; height: 34px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: var(--lavender);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin{ to{ transform: rotate(360deg); } }

/* ============================================================
   LAYER CONTROL PANEL — floating, top-right
   ============================================================ */
#layer-panel{
  position: absolute;
  top: 20px;
  right: 20px;
  width: 260px;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  background: var(--panel-bg);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  padding: 18px 18px 14px;
  z-index: 20;
  font-family: var(--font-body);
  transition: transform 0.28s ease, opacity 0.28s ease;
}
#layer-panel h3{
  margin: 0 0 12px;
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
#layer-panel h3::before{
  content: "";
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--lavender-deep);
  display: inline-block;
}
.layer-row{
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 13.5px;
}
.layer-group + .layer-group{ margin-top: 4px; }
.layer-row.parent{
  font-weight: 600;
  border-top: 1px solid rgba(46,42,61,0.08);
  margin-top: 6px;
  padding-top: 10px;
}
.layer-row.child{
  padding-left: 22px;
  color: var(--ink-soft);
}
.layer-row.has-children label{ flex: 1; }
.group-collapse-btn{
  border: none;
  background: transparent;
  color: var(--ink-soft);
  font-family: var(--font-body);
  font-size: 12px;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.group-collapse-btn:hover{ background: rgba(139,127,209,0.16); color: var(--ink); }
.layer-group-children{ overflow: hidden; }
.layer-group.collapsed .layer-group-children{ display: none; }
.layer-row input[type="checkbox"]{
  accent-color: var(--lavender-deep);
  width: 16px; height: 16px;
  cursor: pointer;
  flex-shrink: 0;
}
.layer-row .swatch{
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.15);
}
.layer-row label{ cursor: pointer; user-select: none; }

/* ============================================================
   BOTTOM DIALOGUE BOX — sliding "card UI" popup
   ============================================================ */
#feature-popup{
  position: absolute;
  left: auto;
  right: 20px;
  bottom: 0;
  width: min(560px, 48vw);
  transform: translate(0, 115%);
  transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 30;
  padding: 0 4px 18px;
}
#feature-popup.open{ transform: translate(0, 0%); }

.popup-shell{
  background: var(--cream);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  padding: 18px 18px 16px;
  position: relative;
  direction: rtl;
  text-align: right;
}

.popup-close{
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--blush);
  color: var(--blush-deep);
  font-size: 15px;
  font-family: var(--font-body);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease, background 0.15s ease;
}
.popup-close:hover{ transform: scale(1.1); background: var(--blush-deep); color: #fff; }

/* Small SubLayer chip card (color set from selected layer) */
.popup-sublayer-card{
  display: flex;
  flex-direction: column;
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  color: #ffffff;
  box-shadow: 0 6px 16px rgba(46, 42, 61, 0.18);
}

.popup-sublayer-card .popup-sublayer{
  font-size: 12.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 0;
  color: inherit;
  align-self: center;
}

/* Header card: Name (prominent) */
.popup-header{
  background: var(--lavender);
  border-radius: var(--radius-md);
  padding: 12px 46px 14px 16px;
  margin-bottom: 12px;
  border-left: 6px solid var(--lavender-deep);
}
.popup-header .popup-name{
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  color: var(--ink);
  margin: 0 0 2px;
  line-height: 1.2;
  text-align: center;
}
.popup-header .popup-sublayer{
  display: none;
}

/* Middle row: 3 equal mini-cards */
.popup-minirow{
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.mini-card{
  flex: 1 1 50%;
  background: var(--mint);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  min-width: 0;
}
.mini-card:nth-child(2){ background: var(--lavender); }
.mini-card .mini-label{
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  color: var(--ink-soft);
  margin: 0 0 4px;
}
.mini-card .mini-value{
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  margin: 0;
  overflow-wrap: break-word;
  font-family: var(--font-body);
}

/* Bottom row: wide Information card */
.popup-info-card{
  background: #fff;
  border: 1px solid rgba(46,42,61,0.08);
  border-radius: var(--radius-md);
  padding: 16px 18px;
}
.popup-info-card .mini-label{
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  color: var(--ink-soft);
  margin: 0 0 6px;
}
.popup-info-card p{
  margin: 0;
  font-size: 16px;
  line-height: 1.65;
  color: var(--ink);
  min-height: 220px;
  max-height: 300px;
  overflow-y: auto;
}

/* Scrollbar polish for panel & popup */
#layer-panel::-webkit-scrollbar, .popup-info-card p::-webkit-scrollbar{ width: 6px; }
#layer-panel::-webkit-scrollbar-thumb, .popup-info-card p::-webkit-scrollbar-thumb{
  background: var(--lavender-deep); border-radius: 4px;
}

/* Layers toggle button (desktop text, mobile hamburger) */
#layers-toggle-btn{
  position: absolute;
  top: 20px;
  right: 292px;
  z-index: 25;
  border: none;
  border-radius: var(--radius-md);
  background: var(--panel-bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  padding: 10px 14px;
  box-shadow: var(--shadow-soft);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

#layers-toggle-btn .hamburger{
  display: none;
  width: 16px;
  height: 12px;
  flex-direction: column;
  justify-content: space-between;
}

#layers-toggle-btn .hamburger span{
  width: 100%;
  height: 2px;
  border-radius: 2px;
  background: var(--ink);
  display: block;
}

/* Climate boundaries toggle (top-right, animated) */
#boundaries-toggle-btn{
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 26;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(216,245,233,0.96), rgba(231,226,251,0.96));
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  padding: 10px 14px;
  box-shadow: var(--shadow-soft);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  direction: rtl;
  text-align: right;
  transition: transform 0.28s ease, box-shadow 0.28s ease, background 0.28s ease;
  animation: boundaryBtnIntro 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

#boundaries-toggle-btn::before{
  content: "";
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--mint-deep);
  box-shadow: 0 0 0 0 rgba(79,174,140,0.45);
  transition: background 0.25s ease, box-shadow 0.4s ease;
}

#boundaries-toggle-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 16px 36px rgba(46, 42, 61, 0.26);
}

#boundaries-toggle-btn.is-active{
  background: linear-gradient(135deg, rgba(79,174,140,0.95), rgba(139,127,209,0.92));
  color: #fff;
}

#boundaries-toggle-btn.is-active::before{
  background: #ffffff;
  box-shadow: 0 0 0 8px rgba(255,255,255,0.2);
}

@keyframes boundaryBtnIntro{
  from{
    opacity: 0;
    transform: translateY(-10px) scale(0.95);
  }
  to{
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

body.layers-hidden #layer-panel{
  transform: translateX(calc(100% + 24px));
  opacity: 0;
  pointer-events: none;
}

body.layers-hidden #layers-toggle-btn{
  right: 20px;
}

@media (max-width: 640px){
  .popup-minirow{ flex-direction: column; }
}

@media (max-width: 768px){
  #feature-popup{
    left: 50%;
    right: auto;
    width: min(640px, 94vw);
    transform: translate(-50%, 115%);
  }

  #feature-popup.open{ transform: translate(-50%, 0%); }

  #layer-panel{
    top: 68px;
    right: 12px;
    width: min(280px, calc(100vw - 24px));
    max-height: calc(100vh - 84px);
    padding: 14px;
    transform: translateX(calc(100% + 20px));
    opacity: 0;
    pointer-events: none;
  }

  body.layers-mobile-open #layer-panel{
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
  }

  #layers-toggle-btn{
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    padding: 0;
    border-radius: 12px;
  }

  #layers-toggle-btn .toggle-text{ display: none; }
  #layers-toggle-btn .hamburger{ display: flex; }

  #boundaries-toggle-btn{
    top: 68px;
    left: 16px;
    font-size: 12px;
    padding: 8px 11px;
    max-width: min(190px, calc(100vw - 32px));
  }
}
</style>
</head>
<body>

<div id="map"></div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div>Loading Risala coordinates…</div>
</div>

<button id="layers-toggle-btn" type="button" aria-controls="layer-panel" aria-expanded="true" title="Toggle layers panel">
  <span class="toggle-text">Hide Layers</span>
  <span class="hamburger" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </span>
</button>

<button id="boundaries-toggle-btn" type="button" aria-pressed="false" title="إظهار حدود الاقاليم">
  <span class="btn-text">إظهار حدود الاقاليم</span>
</button>

<!-- LAYER CONTROL PANEL (populated dynamically once CSV is parsed) -->
<div id="layer-panel">
  <h3>Layers</h3>
  <div id="layer-tree"><!-- checkboxes injected by JS --></div>
</div>

<!-- BOTTOM DIALOGUE BOX / CARD POPUP -->
<div id="feature-popup">
  <div class="popup-shell">
    <button class="popup-close" id="popup-close-btn" title="Close">✕</button>

    <div class="popup-sublayer-card" id="popup-sublayer-card">
      <p class="popup-sublayer" id="popup-sublayer">—</p>
    </div>

    <div class="popup-header">
      <p class="popup-name" id="popup-name">—</p>
    </div>

    <div class="popup-minirow">
      <div class="mini-card">
        <p class="mini-label" id="popup-lat-label">Latitude</p>
        <p class="mini-value" id="popup-lat">—</p>
      </div>
      <div class="mini-card">
        <p class="mini-label" id="popup-longorg-label">Original Longitude</p>
        <p class="mini-value" id="popup-longorg">—</p>
      </div>
    </div>

    <div class="popup-info-card">
      <p class="mini-label" id="popup-info-label">Information</p>
      <p id="popup-info">—</p>
    </div>
  </div>
</div>

<script src="graticules.js"></script>
<script src="boundaries.js"></script>
<script src="geoplaces-now.js"></script>
<script src="app.js"></script>
</body>
</html>
